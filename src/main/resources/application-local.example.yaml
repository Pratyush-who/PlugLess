spring:
  data:
    mongodb:
      uri: "mongodb+srv://<username>:<password>@cluster0.xxxxx.mongodb.net/<dbname>?retryWrites=true&w=majority&appName=Cluster0"

security:
  jwt:
    secret: "make-a-long-random-secret-at-least-32-chars"

cloudinary:
  cloud-name: "your_cloudinary_cloud_name"
  api-key: "your_cloudinary_api_key"
  api-secret: "your_cloudinary_api_secret"
